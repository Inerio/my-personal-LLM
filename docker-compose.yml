###############################################
# Gustave Code — Docker Compose
# Assistant IA personnel — Qualité maximale
###############################################

services:
  # ============================================
  # Ollama — Serveur LLM local (GPU)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: mon-llm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_NUM_PARALLEL=1          # Un seul request pour qualité max
      - OLLAMA_MAX_LOADED_MODELS=1     # Un seul modèle chargé (max VRAM)
      - OLLAMA_KEEP_ALIVE=30m          # Garder en mémoire 30 minutes
      - OLLAMA_ORIGINS=*               # Autoriser toutes les origines
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # ChromaDB — Base de données vectorielle
  # ============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: mon-llm-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Backend — FastAPI + LangChain
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mon-llm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # Frontend — React (dev mode)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mon-llm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://localhost:8000

volumes:
  ollama_data:
    name: mon-llm-ollama-data
  chroma_data:
    name: mon-llm-chroma-data
